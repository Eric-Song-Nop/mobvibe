[build]
  publish = "dist"
  command = "pnpm install --frozen-lockfile && pnpm --filter @mobvibe/shared build && pnpm --filter webui build"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/webui/ packages/shared/ brand/"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--version"

[build.processing]
  skip_processing = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.wasm"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "application/wasm"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Deploy previews are handled by GitHub Actions (preview-deploy.yml)
# using netlify-cli deploy --alias pr-{number}
# VITE_GATEWAY_URL is injected at build time from the workflow
[context.deploy-preview.environment]
  NODE_ENV = "production"
