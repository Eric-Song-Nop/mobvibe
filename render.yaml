# LEGACY: This file is retained for reference during migration to Fly.io + Netlify.
# Production deployment now uses fly.toml (gateway) and netlify.toml (static sites).
# PR previews are handled by .github/workflows/preview-deploy.yml.

services:
  # --- Gateway ---
  - type: web
    name: mobvibe-gateway
    runtime: docker
    dockerfilePath: ./apps/gateway/Dockerfile
    dockerContext: .
    plan: pro
    region: oregon
    numInstances: 1
    healthCheckPath: /health
    domains:
      - api.mobvibe.net
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3005"
      - key: DATABASE_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: SITE_URL
        value: https://api.mobvibe.net
      - key: GATEWAY_CORS_ORIGINS
        value: https://app.mobvibe.net,https://mobvibe.net
      - key: SKIP_EMAIL_VERIFICATION
        value: "false"
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: "Mobvibe <noreply@mobvibe.net>"
      - key: LOG_LEVEL
        value: info
